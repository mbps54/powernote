- name: Build Powernote image
  ansible.builtin.command:
    cmd: docker compose build
    chdir: "{{ powernote_project_dir }}"
  changed_when: true
  listen: Rebuild Powernote service

- name: Recreate Powernote container
  ansible.builtin.command:
    cmd: docker compose up -d --force-recreate --remove-orphans
    chdir: "{{ powernote_project_dir }}"
  changed_when: true
  listen:
    - Rebuild Powernote service
    - Recreate Powernote container
